<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>貪吃蛇遊戲 - HTML5 Canvas</title>
  <style>
    /* 整體頁面樣式：深色背景、字體設定 */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      color: #e5e7eb;
      overflow-x: hidden;
    }

    /* 外層容器，控制整體寬度與對齊 */
    .game-wrapper {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(148, 163, 184, 0.2);
      padding: 24px 24px 20px;
      width: 420px;
      box-sizing: border-box;
      backdrop-filter: blur(18px);
    }

    /* 頂部標題與分數列 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f9fafb;
    }

    /* 分數區塊 */
    .scoreboard {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .score-chip {
      background: rgba(15, 118, 110, 0.12);
      color: #6ee7b7;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(45, 212, 191, 0.4);
      font-weight: 600;
    }

    .high-score-chip {
      background: rgba(55, 48, 163, 0.16);
      color: #a5b4fc;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(129, 140, 248, 0.5);
      font-weight: 600;
    }

    /* Canvas 外框（手機版：滑動不觸發頁面捲動） */
    .canvas-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: radial-gradient(circle at top left, #020617 0, #020617 30%, #030712 100%);
      margin-bottom: 16px;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    canvas {
      display: block;
      background: #020617;
    }

    /* 遊戲狀態提示（如：遊戲結束、按開始） */
    .status-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      padding: 0 16px;
      box-sizing: border-box;
    }

    .status-overlay h2 {
      margin: 0 0 6px;
      font-size: 18px;
      color: #e5e7eb;
    }

    .status-overlay .mobile-hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }

    /* 按鈕區域 */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    button.main-btn {
      flex: 1;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #f9fafb;
      box-shadow:
        0 8px 16px rgba(34, 197, 94, 0.25),
        0 0 0 1px rgba(22, 163, 74, 0.7);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    button.main-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 12px 24px rgba(34, 197, 94, 0.35),
        0 0 0 1px rgba(22, 163, 74, 0.8);
    }

    button.main-btn:active {
      transform: translateY(0);
      box-shadow:
        0 6px 12px rgba(34, 197, 94, 0.2),
        0 0 0 1px rgba(22, 163, 74, 0.75);
    }

    .hint {
      font-size: 11px;
      color: #6b7280;
      text-align: right;
    }

    /* 難度與樣式選擇區塊 */
    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .setting-label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.02em;
    }

    .difficulty-btns {
      display: flex;
      gap: 8px;
    }

    .difficulty-btns button {
      flex: 1;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(30, 41, 59, 0.8);
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .difficulty-btns button:hover {
      background: rgba(51, 65, 85, 0.9);
      color: #e2e8f0;
    }

    .difficulty-btns button.active {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border-color: rgba(34, 197, 94, 0.6);
    }

    .snake-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .snake-colors .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.15s;
    }

    .snake-colors .color-swatch:hover {
      transform: scale(1.1);
    }

    .snake-colors .color-swatch.selected {
      border-color: #f9fafb;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3);
    }

    /* ======= 修改：手機版觸控十字鍵 ======= */
    .touch-controls {
      display: none; /* 預設桌面隱藏 */
      margin: 16px 0 12px;
      justify-content: center;
      align-items: center;
    }

    .d-pad {
      display: grid;
      grid-template-columns: 45px 45px 45px;
      grid-template-rows: 45px 45px 45px;
      justify-content: center;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.6));
    }

    .d-btn {
      width: 45px;
      height: 45px;
      background: #f8fafc; /* 亮白色，接近參考圖片 */
      border: none;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      /* 模擬實體按鍵邊緣反光與暗面 */
      box-shadow: inset 1px 1px 2px #fff, inset -1px -1px 3px rgba(148, 163, 184, 0.4);
      padding: 0;
      transition: background 0.05s, box-shadow 0.05s;
      -webkit-tap-highlight-color: transparent; /* 避免手機點擊高光閃爍 */
      user-select: none;
    }

    .d-btn:active {
      background: #e2e8f0;
      box-shadow: inset 2px 2px 4px rgba(100, 116, 139, 0.3);
    }

    /* 十字鍵中心無縫過渡區塊 */
    .d-center {
      grid-column: 2;
      grid-row: 2;
      width: 45px;
      height: 45px;
      background: #f8fafc;
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.5), inset -1px -1px 1px rgba(148, 163, 184, 0.2);
    }

    /* 定位與四邊圓角 */
    .d-btn.up { grid-column: 2; grid-row: 1; border-radius: 8px 8px 0 0; }
    .d-btn.left { grid-column: 1; grid-row: 2; border-radius: 8px 0 0 8px; }
    .d-btn.right { grid-column: 3; grid-row: 2; border-radius: 0 8px 8px 0; }
    .d-btn.down { grid-column: 2; grid-row: 3; border-radius: 0 0 8px 8px; }

    /* 十字鍵上的刻痕箭頭 (CSS 畫出的三角形) */
    .d-btn::before {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
    }
    .d-btn.up::before { border-width: 0 6px 8px 6px; border-color: transparent transparent #94a3b8 transparent; margin-bottom: 4px; }
    .d-btn.down::before { border-width: 8px 6px 0 6px; border-color: #94a3b8 transparent transparent transparent; margin-top: 4px; }
    .d-btn.left::before { border-width: 6px 8px 6px 0; border-color: transparent #94a3b8 transparent transparent; margin-right: 4px; }
    .d-btn.right::before { border-width: 6px 0 6px 8px; border-color: transparent transparent transparent #94a3b8; margin-left: 4px; }

    @media (max-width: 768px) {
      .game-wrapper {
        width: 100%;
        margin: 12px;
        max-width: 100%;
      }
      .hint {
        font-size: 10px;
      }
      .touch-controls {
        display: flex; /* 小螢幕顯示十字鍵 */
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <div class="title">貪吃蛇 Snake</div>
      <div class="scoreboard">
        <div class="score-chip">分數：<span id="score">0</span></div>
        <div class="high-score-chip">最高：<span id="highScore">0</span></div>
      </div>
    </div>

    <div class="settings-row">
      <span class="setting-label">難度</span>
      <div class="difficulty-btns" id="difficultyBtns">
        <button type="button" class="difficulty-btn active" data-difficulty="easy">初級</button>
        <button type="button" class="difficulty-btn" data-difficulty="medium">中級</button>
        <button type="button" class="difficulty-btn" data-difficulty="hard">高級</button>
      </div>
    </div>

    <div class="settings-row">
      <span class="setting-label">蛇的樣式</span>
      <div class="snake-colors" id="snakeColors"></div>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas" width="400" height="400"></canvas>

      <div id="statusOverlay" class="status-overlay">
        <h2>按下「開始遊戲」</h2>
        <p>使用鍵盤方向鍵控制蛇的移動</p>
        <p class="mobile-hint">手機：可滑動或點擊十字鍵控制方向</p>
      </div>
    </div>

    <div class="touch-controls" id="touchControls">
      <div class="d-pad">
        <button type="button" class="d-btn up" data-dir="up"></button>
        <button type="button" class="d-btn left" data-dir="left"></button>
        <div class="d-center"></div>
        <button type="button" class="d-btn right" data-dir="right"></button>
        <button type="button" class="d-btn down" data-dir="down"></button>
      </div>
    </div>

    <div class="controls">
      <button class="main-btn" id="startButton">開始遊戲</button>
      <div class="hint">方向鍵操作 ↑ ↓ ← →</div>
    </div>
  </div>

  <script>
    (function removeDuplicateGameWrappers() {
      var wrappers = document.querySelectorAll("body > .game-wrapper");
      for (var i = 1; i < wrappers.length; i++) {
        wrappers[i].remove();
      }
    })();

    // === 基本參數設定 ===
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");
    const startButton = document.getElementById("startButton");
    const statusOverlay = document.getElementById("statusOverlay");

    const gridSize = 20;
    const playOffset = 10; 
    const playSize = canvas.width - playOffset * 2; 
    const tileCount = playSize / gridSize; 

    const difficultyLevels = {
      easy:   { speed: 150, maxObstacles: 0,  stonesPerFruit: 0, pointsPerFruit: 1 },
      medium: { speed: 130, maxObstacles: 25, stonesPerFruit: 1, pointsPerFruit: 2 },
      hard:   { speed: 100, maxObstacles: 40, stonesPerFruit: 2, pointsPerFruit: 3 },
    };

    const snakeStyles = [
      { name: "經典綠", head: "#4ade80", body: "#22c55e", shadow: "rgba(34, 197, 94, 0.8)" },
      { name: "天空藍", head: "#7dd3fc", body: "#0ea5e9", shadow: "rgba(14, 165, 233, 0.8)" },
      { name: "玫瑰紅", head: "#fda4af", body: "#f43f5e", shadow: "rgba(244, 63, 94, 0.8)" },
      { name: "琥珀黃", head: "#fde047", body: "#eab308", shadow: "rgba(234, 179, 8, 0.8)" },
      { name: "紫羅蘭", head: "#c4b5fd", body: "#8b5cf6", shadow: "rgba(139, 92, 246, 0.8)" },
      { name: "青綠色", head: "#5eead4", body: "#14b8a6", shadow: "rgba(20, 184, 166, 0.8)" },
      { name: "珊瑚橙", head: "#fdba74", body: "#f97316", shadow: "rgba(249, 115, 22, 0.8)" },
      { name: "粉紅色", head: "#f9a8d4", body: "#ec4899", shadow: "rgba(236, 72, 153, 0.8)" },
      { name: "靛藍色", head: "#a5b4fc", body: "#6366f1", shadow: "rgba(99, 102, 241, 0.8)" },
      { name: "薄荷綠", head: "#6ee7b7", body: "#10b981", shadow: "rgba(16, 185, 129, 0.8)" },
      { name: "磚紅色", head: "#fca5a5", body: "#dc2626", shadow: "rgba(220, 38, 38, 0.8)" },
      { name: "金黃色", head: "#fef08a", body: "#ca8a04", shadow: "rgba(202, 138, 4, 0.8)" },
      { name: "冰藍色", head: "#bae6fd", body: "#0284c7", shadow: "rgba(2, 132, 199, 0.8)" },
      { name: "薰衣草", head: "#e9d5ff", body: "#a78bfa", shadow: "rgba(167, 139, 250, 0.8)" },
      { name: "灰綠色", head: "#86efac", body: "#15803d", shadow: "rgba(21, 128, 61, 0.8)" }
    ];

    const foodTypes = [
      { name: "蘋果", color: "#ef4444" },
      { name: "香蕉", color: "#eab308" },
      { name: "葡萄", color: "#a855f7" },
      { name: "草莓", color: "#f97373" },
      { name: "橘子", color: "#f97316" },
      { name: "藍莓", color: "#3b82f6" },
      { name: "奇異果", color: "#22c55e" },
      { name: "西瓜", color: "#16a34a" },
      { name: "鳳梨", color: "#facc15" },
      { name: "櫻桃", color: "#fb7185" },
    ];

    let snake = [];       
    let direction = { x: 1, y: 0 }; 
    let nextDirection = { x: 1, y: 0 }; 
    let food = { x: 10, y: 10 };  
    let currentFoodTypeIndex = 0; 
    let score = 0;
    let highScore = 0;
    let gameLoopId = null;
    let isRunning = false;  
    let isPaused = false;   
    let isGameOver = false; 
    let currentDifficulty = "easy";   
    let currentSnakeStyleIndex = 0;  
    let obstacles = [];     
    let fruitsEaten = 0;    

    const storedHighScore = localStorage.getItem("snakeHighScore");
    if (storedHighScore !== null) {
      highScore = parseInt(storedHighScore, 10) || 0;
      highScoreEl.textContent = highScore;
    }

    initDifficultyBtns();
    initSnakeColors();

    window.addEventListener("keydown", (event) => {
      if (event.key === " " || event.code === "Space" || event.key === "p" || event.key === "P") {
        if (!isGameOver) {
          if (!isRunning && !isPaused && gameLoopId === null) {
            startGame();
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          if (gameLoopId !== null) {
            if (isPaused) resumeGame();
            else pauseGame();
            event.preventDefault();
            event.stopPropagation();
          }
        }
        return;
      }

      if (!isRunning && !isPaused) return;

      switch (event.key) {
        case "ArrowUp":
          if (direction.y === 1) break;
          nextDirection = { x: 0, y: -1 };
          event.preventDefault();
          break;
        case "ArrowDown":
          if (direction.y === -1) break;
          nextDirection = { x: 0, y: 1 };
          event.preventDefault();
          break;
        case "ArrowLeft":
          if (direction.x === 1) break;
          nextDirection = { x: -1, y: 0 };
          event.preventDefault();
          break;
        case "ArrowRight":
          if (direction.x === -1) break;
          nextDirection = { x: 1, y: 0 };
          event.preventDefault();
          break;
        default:
          break;
      }
    }, true);

    let touchStartX = 0;
    let touchStartY = 0;
    const minSwipeDistance = 30; 

    canvas.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener("touchmove", (event) => {
      if (event.touches.length === 1) event.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", (event) => {
      if (event.changedTouches.length !== 1) return;
      const endX = event.changedTouches[0].clientX;
      const endY = event.changedTouches[0].clientY;
      const dx = endX - touchStartX;
      const dy = endY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (absDx < minSwipeDistance && absDy < minSwipeDistance) {
        if (!isGameOver) {
          if (!isRunning && !isPaused && gameLoopId === null) {
            startGame();
          } else if (gameLoopId !== null) {
            if (isPaused) resumeGame();
            else pauseGame();
          }
        }
        return;
      }

      if (!isRunning && !isPaused) return;

      if (absDx > absDy) {
        if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
        else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      } else {
        if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        else if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
      }
    }, { passive: true });

    // ======= 綁定新的十字按鍵 =======
    const touchControls = document.getElementById("touchControls");
    function handleDirectionInput(dir) {
      if (!isGameOver) {
        if (!isRunning && !isPaused && gameLoopId === null) startGame();
      }
      if (!isRunning && !isPaused) return;

      if (dir === "up" && direction.y !== 1) nextDirection = { x: 0, y: -1 };
      else if (dir === "down" && direction.y !== -1) nextDirection = { x: 0, y: 1 };
      else if (dir === "left" && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      else if (dir === "right" && direction.x !== -1) nextDirection = { x: 1, y: 0 };
    }

    if (touchControls) {
      touchControls.querySelectorAll(".d-btn").forEach((btn) => {
        // 為了讓手機點擊反應更快，推薦加入 touchstart 處理，若不加也可依靠原生 click
        const triggerDir = (e) => {
          e.preventDefault(); // 防止長按反白
          const dir = btn.dataset.dir;
          if (dir) handleDirectionInput(dir);
        };
        btn.addEventListener("touchstart", triggerDir, { passive: false });
        btn.addEventListener("mousedown", triggerDir); // 桌面滑鼠也能點擊十字鍵
      });
    }

    startButton.addEventListener("click", () => {
      if (!isRunning && !isPaused && !isGameOver) startGame();
      else if (isRunning && !isPaused && !isGameOver) pauseGame();
      else if (!isRunning && isPaused && !isGameOver) resumeGame();
      else if (!isRunning && !isPaused && isGameOver) startGame();
    });

    function initDifficultyBtns() {
      const container = document.getElementById("difficultyBtns");
      if (!container) return;
      container.querySelectorAll(".difficulty-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (isRunning || isPaused) return; 
          currentDifficulty = btn.dataset.difficulty || "easy";
          container.querySelectorAll(".difficulty-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          resetGameState();
          draw();
        });
      });
    }

    function initSnakeColors() {
      const container = document.getElementById("snakeColors");
      if (!container) return;
      container.innerHTML = "";
      snakeStyles.forEach((style, idx) => {
        const swatch = document.createElement("div");
        swatch.className = "color-swatch" + (idx === currentSnakeStyleIndex ? " selected" : "");
        swatch.style.backgroundColor = style.body;
        swatch.title = style.name;
        swatch.addEventListener("click", () => {
          currentSnakeStyleIndex = idx;
          container.querySelectorAll(".color-swatch").forEach((s, i) => {
            s.classList.toggle("selected", i === idx);
          });
          draw();
        });
        container.appendChild(swatch);
      });
    }

    function startGame() {
      resetGameState();
      isRunning = true;
      isPaused = false;
      isGameOver = false;
      statusOverlay.style.display = "none";
      startButton.textContent = "暫停遊戲";
      const speed = difficultyLevels[currentDifficulty]?.speed ?? 150;
      gameLoopId = setInterval(gameTick, speed);
    }

    function pauseGame() {
      if (!isRunning || isPaused || isGameOver) return;
      isPaused = true;
      isRunning = false;
      startButton.textContent = "繼續遊戲";
      statusOverlay.style.display = "flex";
      statusOverlay.innerHTML = `
        <h2>已暫停</h2>
        <p>按「繼續遊戲」或空白鍵 / P 鍵繼續</p>
      `;
    }

    function resumeGame() {
      if (isRunning || !isPaused || isGameOver) return;
      isPaused = false;
      isRunning = true;
      startButton.textContent = "暫停遊戲";
      statusOverlay.style.display = "none";
    }

    function resetGameState() {
      const startX = Math.floor(tileCount / 2) - 2;
      const startY = Math.floor(tileCount / 2);
      snake = [
        { x: startX + 2, y: startY },
        { x: startX + 1, y: startY },
        { x: startX,     y: startY },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      fruitsEaten = 0;
      scoreEl.textContent = score;
      obstacles = [];
      placeFood();
      draw();
    }

    function gameTick() {
      if (isPaused) return;

      direction = nextDirection;
      const head = snake[0];
      const newHead = { x: head.x + direction.x, y: head.y + direction.y };

      if (newHead.x < 0 || newHead.x >= tileCount || newHead.y < 0 || newHead.y >= tileCount) {
        endGame();
        return;
      }
      if (isOnSnake(newHead.x, newHead.y)) {
        endGame();
        return;
      }
      if (isOnObstacle(newHead.x, newHead.y)) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        const points = difficultyLevels[currentDifficulty]?.pointsPerFruit ?? 1;
        score += points;
        fruitsEaten++; 
        scoreEl.textContent = score;

        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem("snakeHighScore", String(highScore));
        }
        updateObstaclesAfterFruit();
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function endGame() {
      isRunning = false;
      isPaused = false;
      isGameOver = true;
      if (gameLoopId !== null) {
        clearInterval(gameLoopId);
        gameLoopId = null;
      }
      statusOverlay.style.display = "flex";
      statusOverlay.innerHTML = `
        <h2>遊戲結束！</h2>
        <p>當前分數：${score}　最高分：${highScore}</p>
        <p>按下「重新開始」再玩一次</p>
      `;
      startButton.textContent = "重新開始";
    }

    function placeFood() {
      let newX, newY;
      do {
        newX = 2 + Math.floor(Math.random() * (tileCount - 4));
        newY = 2 + Math.floor(Math.random() * (tileCount - 4));
      } while (isOnSnake(newX, newY) || isOnObstacle(newX, newY)); 

      food = { x: newX, y: newY };
      currentFoodTypeIndex = Math.floor(Math.random() * foodTypes.length);
    }

    function isOnSnake(x, y) {
      return snake.some((segment) => segment.x === x && segment.y === y);
    }

    function isOnObstacle(x, y) {
      return obstacles.some((stone) => stone.x === x && stone.y === y);
    }

    function updateObstaclesAfterFruit() {
      const config = difficultyLevels[currentDifficulty];
      if (!config || config.maxObstacles === 0 || config.stonesPerFruit === 0) return;

      const targetCount = Math.min(config.maxObstacles, config.stonesPerFruit * fruitsEaten);
      if (obstacles.length >= targetCount) return;

      const maxTriesPerStone = 100;
      while (obstacles.length < targetCount) {
        let placed = false;
        for (let i = 0; i < maxTriesPerStone; i++) {
          const x = Math.floor(Math.random() * tileCount);
          const y = Math.floor(Math.random() * tileCount);

          if (isOnSnake(x, y)) continue;
          if (food && x === food.x && y === food.y) continue;
          if (isOnObstacle(x, y)) continue;
          
          const distFromFood = Math.abs(x - food.x) + Math.abs(y - food.y);
          if (distFromFood < 5) continue;

          obstacles.push({ x, y });
          placed = true;
          break;
        }
        if (!placed) break;
      }
    }

    function draw() {
      drawBackgroundGrid();
      drawObstacles();
      drawFood();
      drawSnake();
    }

    // ======= 修改：加上內框並將網格限制在內框裡 =======
    function drawBackgroundGrid() {
      // 1. 填滿最外層背景
      const gradient = ctx.createRadialGradient(
        canvas.width * 0.25,
        canvas.height * 0.2,
        20,
        canvas.width / 2,
        canvas.height / 2,
        260
      );
      gradient.addColorStop(0, "#020617");
      gradient.addColorStop(1, "#000000");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 2. 設定內框範圍，利用 clip() 限制網格不會超線
      ctx.save();
      const innerRadius = 8;
      ctx.beginPath();
      roundRect(ctx, playOffset, playOffset, playSize, playSize, innerRadius);
      ctx.clip(); // 限制接下來畫的網格只會出現在此區域內
      
      // 繪製內框底色（稍微跟背景有層次）
      ctx.fillStyle = "#030712";
      ctx.fill();

      // 繪製網格線
      ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
      ctx.lineWidth = 1;
      for (let i = 1; i < tileCount; i++) {
        // 垂直線 (+0.5 確保 Canvas 線條清晰)
        ctx.beginPath();
        ctx.moveTo(playOffset + i * gridSize + 0.5, playOffset);
        ctx.lineTo(playOffset + i * gridSize + 0.5, playOffset + playSize);
        ctx.stroke();

        // 水平線
        ctx.beginPath();
        ctx.moveTo(playOffset, playOffset + i * gridSize + 0.5);
        ctx.lineTo(playOffset + playSize, playOffset + i * gridSize + 0.5);
        ctx.stroke();
      }
      ctx.restore();

      // 3. 補上內框的實體邊框，增加立體感
      ctx.strokeStyle = "rgba(148, 163, 184, 0.35)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      roundRect(ctx, playOffset, playOffset, playSize, playSize, innerRadius);
      ctx.stroke();
    }

    function drawObstacles() {
      if (!obstacles.length) return;
      obstacles.forEach(({ x, y }) => {
        const px = playOffset + x * gridSize;
        const py = playOffset + y * gridSize;
        const size = gridSize - 4;
        const offset = (gridSize - size) / 2;
        ctx.fillStyle = "rgba(100, 116, 139, 0.9)";
        ctx.strokeStyle = "rgba(148, 163, 184, 0.5)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        roundRect(ctx, px + offset, py + offset, size, size, 4);
        ctx.fill();
        ctx.stroke();
      });
    }

    function drawFood() {
      const px = playOffset + food.x * gridSize;
      const py = playOffset + food.y * gridSize;
      const type = foodTypes[currentFoodTypeIndex] || foodTypes[0];

      const baseSize = gridSize - 10;
      const offset = (gridSize - baseSize) / 2;
      const x = px + offset;
      const y = py + offset;
      const radius = 7;

      ctx.beginPath();
      ctx.fillStyle = type.color;
      roundRect(ctx, x, y, baseSize, baseSize, radius);
      ctx.fill();

      ctx.fillStyle = "#22c55e";
      ctx.beginPath();
      ctx.ellipse(
        x + baseSize * 0.25, 
        y + baseSize * 0.18,
        3,                   
        5,
        Math.PI / 8,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawSnake() {
      const style = snakeStyles[currentSnakeStyleIndex] || snakeStyles[0];
      ctx.shadowColor = style.shadow;
      ctx.shadowBlur = 14;

      for (let i = 0; i < snake.length; i++) {
        const segment = snake[i];
        const isHead = i === 0;
        const px = playOffset + segment.x * gridSize;
        const py = playOffset + segment.y * gridSize;

        const size = gridSize - 4;
        const offset = (gridSize - size) / 2;
        const x = px + offset;
        const y = py + offset;
        const radius = isHead ? 7 : 5;

        const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
        if (isHead) {
          gradient.addColorStop(0, style.head);
          gradient.addColorStop(1, style.body);
        } else {
          gradient.addColorStop(0, style.body);
          gradient.addColorStop(1, style.body);
        }

        ctx.beginPath();
        ctx.fillStyle = gradient;
        roundRect(ctx, x, y, size, size, radius);
        ctx.fill();

        if (isHead) {
          ctx.shadowBlur = 0;
          const eyeRadius = 3;
          const pupilRadius = 1.5;
          const centerX = x + size / 2;
          const centerY = y + size / 2;
          let leftEyeX, leftEyeY, rightEyeX, rightEyeY;

          if (direction.x === 1) { 
            leftEyeX = centerX + size * 0.18;
            rightEyeX = centerX + size * 0.18;
            leftEyeY = centerY - size * 0.18;
            rightEyeY = centerY + size * 0.18;
          } else if (direction.x === -1) { 
            leftEyeX = centerX - size * 0.18;
            rightEyeX = centerX - size * 0.18;
            leftEyeY = centerY - size * 0.18;
            rightEyeY = centerY + size * 0.18;
          } else if (direction.y === -1) { 
            leftEyeY = centerY - size * 0.18;
            rightEyeY = centerY - size * 0.18;
            leftEyeX = centerX - size * 0.18;
            rightEyeX = centerX + size * 0.18;
          } else { 
            leftEyeY = centerY + size * 0.18;
            rightEyeY = centerY + size * 0.18;
            leftEyeX = centerX - size * 0.18;
            rightEyeX = centerX + size * 0.18;
          }

          ctx.fillStyle = "#f9fafb";
          ctx.beginPath();
          ctx.arc(leftEyeX, leftEyeY, eyeRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(rightEyeX, rightEyeY, eyeRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#111827";
          ctx.beginPath();
          ctx.arc(leftEyeX, leftEyeY, pupilRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(rightEyeX, rightEyeY, pupilRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 14;
        }
      }

      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    resetGameState();
    statusOverlay.style.display = "flex";
  </script>
</body>
